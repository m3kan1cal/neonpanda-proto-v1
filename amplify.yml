version: 1
applications:
  - appRoot: .
    frontend:
      phases:
        preBuild:
          commands:
            - nvm install 22
            - nvm use 22
            - node -v

            # Fetch tag refs so vite.config.js can stamp build-meta.json
            # with the latest release tag (Amplify's default clone is shallow
            # and does not include tags).
            - git fetch --tags --force origin || true

            - npm install --cache .npm --prefer-offline --legacy-peer-deps

            # Set the environment variables
            - echo "DYNAMODB_TABLE_NAME=$DYNAMODB_TABLE_NAME" >> .env
            - echo "PINECONE_API_KEY=$PINECONE_API_KEY" >> .env

            # Deploy the backend
            - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
        build:
          commands:
            # Run unit tests
            - npm test

            # Generate Swagger API documentation (reads amplify/swagger/openapi.yaml -> public/api-docs/index.html)
            - npm run swagger:generate

            # Build the frontend
            - npm run build
      artifacts:
        baseDirectory: dist
        files:
          - "**/*"
      cache:
        paths:
          - .npm/**/*
    customHeaders:
      - pattern: "**"
        headers:
          - key: "X-Frame-Options"
            value: "DENY"
          - key: "X-XSS-Protection"
            value: "1; mode=block"
      # Build manifest must never be cached so clients can detect new deploys promptly.
      - pattern: "/build-meta.json"
        headers:
          - key: "Cache-Control"
            value: "no-store, max-age=0, must-revalidate"
      # SEO discovery files must be served with correct MIME types so Google
      # does not treat them as soft 404s.
      - pattern: "/robots.txt"
        headers:
          - key: "Content-Type"
            value: "text/plain; charset=utf-8"
      - pattern: "/sitemap.xml"
        headers:
          - key: "Content-Type"
            value: "application/xml; charset=utf-8"
    redirects:
      # Public pages - strip trailing slashes
      - source: "/about/"
        target: "/about"
        status: "301"
      - source: "/technology/"
        target: "/technology"
        status: "301"
      - source: "/privacy/"
        target: "/privacy"
        status: "301"
      - source: "/terms/"
        target: "/terms"
        status: "301"
      - source: "/faqs/"
        target: "/faqs"
        status: "301"
      - source: "/changelog/"
        target: "/changelog"
        status: "301"
      - source: "/contact/"
        target: "/contact"
        status: "301"
      - source: "/blog/"
        target: "/blog"
        status: "301"
      - source: "/white-papers/"
        target: "/white-papers"
        status: "301"
      - source: "/welcome/"
        target: "/welcome"
        status: "301"

      # Preserve the pre-React-route URL for the one externally linked white
      # paper (Grant) so the April platform update email link keeps working.
      # The other three papers weren't shared externally, but we 301 them too
      # as cheap insurance for any internal references we missed.
      - source: "/white-papers/use-case-grant-first-meet-prep.html"
        target: "/white-papers/use-case-grant-first-meet-prep"
        status: "301"
      - source: "/white-papers/use-case-david-returning-athlete.html"
        target: "/white-papers/use-case-david-returning-athlete"
        status: "301"
      - source: "/white-papers/use-case-james-functional-chaos.html"
        target: "/white-papers/use-case-james-functional-chaos"
        status: "301"
      - source: "/white-papers/use-case-paige-respiratory-therapist-iterates.html"
        target: "/white-papers/use-case-paige-respiratory-therapist-iterates"
        status: "301"

      # Protected pages - strip trailing slashes
      - source: "/auth/"
        target: "/auth"
        status: "301"
      - source: "/coach-creator/"
        target: "/coach-creator"
        status: "301"
      - source: "/coaches/"
        target: "/coaches"
        status: "301"
      - source: "/settings/"
        target: "/settings"
        status: "301"
      - source: "/training-grounds/"
        target: "/training-grounds"
        status: "301"

      # API docs - serve static Swagger UI (before SPA fallback)
      - source: "/api-docs"
        target: "/api-docs/index.html"
        status: "200"

      # SEO discovery files - serve static files directly (before SPA fallback)
      # so Googlebot does not receive the SPA shell (soft 404).
      - source: "/robots.txt"
        target: "/robots.txt"
        status: "200"
      - source: "/sitemap.xml"
        target: "/sitemap.xml"
        status: "200"

      # SPA fallback - serve index.html for all other routes
      - source: "/<*>"
        target: "/index.html"
        status: "200"
settings:
  nodeVersion: 22
