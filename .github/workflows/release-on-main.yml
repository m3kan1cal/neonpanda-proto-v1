# Release on every push to `main` (including PR merges).
#
# Tag-only flow: this workflow creates a new prerelease tag and GitHub release
# pointing at the merge SHA. It intentionally does NOT commit a version bump
# back to `main`; that extra commit triggered a second Amplify deploy for every
# merge. The deployed bundle reads its version from the latest git tag at build
# time (see vite.config.js), so package.json no longer has to carry the version.
#
# Validation after a merge:
# - A new prerelease `v1.0.YYYYMMDD-beta[.N]` appears in GitHub Releases,
#   tagged on the merge commit.
# - Only one Amplify build runs per merge (no follow-up bump commit).
# - A second merge the same UTC day produces `v1.0.YYYYMMDD-beta.1`, then .2, etc.
#
# Optional: include [skip release] anywhere in the head commit message to skip
# releasing that push.

name: Release on main

on:
  push:
    branches:
      - main

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: read

jobs:
  release:
    if: ${{ !contains(github.event.head_commit.message, '[skip release]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create tag and GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git fetch --tags --force

          DATE=$(date -u +%Y%m%d)
          i=0
          while true; do
            if [ "$i" -eq 0 ]; then
              GIT_TAG="v1.0.${DATE}-beta"
            else
              GIT_TAG="v1.0.${DATE}-beta.${i}"
            fi
            if git rev-parse "$GIT_TAG" >/dev/null 2>&1; then
              i=$((i + 1))
              continue
            fi
            break
          done

          PREVIOUS_TAG="$(git tag -l 'v1.0.*' | sort -V | tail -n1 || true)"

          echo "New tag: ${GIT_TAG}"
          echo "Previous tag for notes: ${PREVIOUS_TAG:-<none>}"
          echo "Target SHA: ${GITHUB_SHA}"

          # gh release create will create the tag on the target SHA if it does
          # not already exist, so we do not need a separate `git tag && git push`
          # step. The release is targeted at the exact merge SHA so the release
          # page ties back to the commit that triggered this run.
          if [ -n "${PREVIOUS_TAG}" ]; then
            gh release create "${GIT_TAG}" \
              --title "${GIT_TAG}" \
              --generate-notes \
              --notes-start-tag "${PREVIOUS_TAG}" \
              --target "${GITHUB_SHA}" \
              --prerelease
          else
            gh release create "${GIT_TAG}" \
              --title "${GIT_TAG}" \
              --generate-notes \
              --target "${GITHUB_SHA}" \
              --prerelease
          fi
