<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />

    <!-- Favicon - SVG first for modern browsers, then fallbacks -->
    <link
      rel="icon"
      type="image/svg+xml"
      href="/images/icons/generated/svg/icon.svg"
    />
    <link
      rel="icon"
      type="image/x-icon"
      href="/images/icons/generated/favicon/favicon.ico"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/images/icons/generated/web/icon-32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="/images/icons/generated/web/icon-16.png"
    />

    <!-- Apple Touch Icons -->
    <link
      rel="apple-touch-icon"
      href="/images/icons/generated/web/apple-touch-icon.png"
    />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/images/icons/generated/web/apple-touch-icon.png"
    />
    <link
      rel="apple-touch-icon"
      sizes="152x152"
      href="/images/icons/generated/web/icon-152.png"
    />
    <link
      rel="apple-touch-icon"
      sizes="144x144"
      href="/images/icons/generated/web/icon-144.png"
    />
    <link
      rel="apple-touch-icon"
      sizes="120x120"
      href="/images/icons/generated/web/icon-120.png"
    />

    <!-- Font preconnect hints (Google Fonts loaded via @import in index.css) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Theme and Mobile Meta Tags -->
    <meta name="theme-color" content="#341460" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="NeonPanda" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="NeonPanda" />
    <meta name="msapplication-TileColor" content="#341460" />
    <meta
      name="msapplication-TileImage"
      content="/images/icons/generated/web/icon-144.png"
    />

    <!-- SEO Meta Tags -->
    <title>
      AI Fitness Coach for CrossFit, Powerlifting &amp; HYROX | NeonPanda
    </title>
    <meta
      name="description"
      content="Create your own AI fitness coach that remembers every PR, writes personalized programming, and logs workouts in plain English. 11 disciplines. Start free."
    />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://neonpanda.ai" />
    <meta property="og:site_name" content="NeonPanda" />
    <meta
      property="og:title"
      content="AI Fitness Coach for CrossFit, Powerlifting &amp; HYROX | NeonPanda"
    />
    <meta
      property="og:description"
      content="Create your own AI fitness coach that remembers every PR, writes personalized programming, and logs workouts in plain English. 11 disciplines. Start free."
    />
    <meta
      property="og:image"
      content="https://neonpanda.ai/images/icons/generated/web/icon-512.png"
    />
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="AI Fitness Coach for CrossFit, Powerlifting &amp; HYROX | NeonPanda"
    />
    <meta
      name="twitter:description"
      content="Create your own AI fitness coach that remembers every PR, writes personalized programming, and logs workouts in plain English."
    />
    <meta
      name="twitter:image"
      content="https://neonpanda.ai/images/icons/generated/web/icon-512.png"
    />

    <!-- Canonical URL (route-aware pages override via useSeoHead) -->
    <link rel="canonical" href="https://neonpanda.ai/" />

    <!-- Structured data: Organization + SoftwareApplication + WebSite.
         SearchAction is intentionally omitted — no public /search route yet. -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "Organization",
            "name": "NeonPanda",
            "url": "https://neonpanda.ai",
            "logo": "https://neonpanda.ai/images/icons/generated/web/icon-512.png",
            "sameAs": [
              "https://www.instagram.com/neonpanda.ai",
              "https://www.tiktok.com/@neonpanda.ai",
              "https://www.youtube.com/@NeonPandaAI",
              "https://twitter.com/NeonPandaAI",
              "https://www.facebook.com/neonpandaai/"
            ]
          },
          {
            "@type": "SoftwareApplication",
            "name": "NeonPanda",
            "applicationCategory": "HealthApplication",
            "operatingSystem": "Web",
            "url": "https://neonpanda.ai",
            "description": "Personalized AI fitness coaching platform supporting 11 disciplines including CrossFit, powerlifting, HYROX, running, and more.",
            "offers": {
              "@type": "Offer",
              "price": "0",
              "priceCurrency": "USD"
            }
          },
          {
            "@type": "WebSite",
            "url": "https://neonpanda.ai",
            "name": "NeonPanda"
          }
        ]
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
