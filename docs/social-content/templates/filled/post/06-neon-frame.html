<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        width: 1080px;
        height: 1080px;
        overflow: hidden;
        font-family: "Inter", "Segoe UI", Arial, sans-serif;
      }
      .canvas {
        width: 1080px;
        height: 1080px;
        position: relative;
        overflow: hidden;
      }
      .logo-full {
        position: absolute;
        z-index: 10;
      }
      .logo-head {
        position: absolute;
        z-index: 10;
      }
      .logo-full img {
        height: 100px;
        width: auto;
      }
      .logo-head img {
        height: 162px;
        width: auto;
      }

      .canvas {
        background: linear-gradient(
          160deg,
          #0a0015 0%,
          #1a0a2e 50%,
          #2d1b4e 100%
        );
      }
      .frame {
        position: absolute;
        top: 50px;
        left: 50px;
        right: 50px;
        bottom: 50px;
        border: 2px solid rgba(0, 229, 255, 0.4);
        box-shadow:
          0 0 30px rgba(0, 229, 255, 0.15),
          inset 0 0 30px rgba(0, 229, 255, 0.05);
      }
      .frame::before {
        content: "";
        position: absolute;
        top: -8px;
        left: -8px;
        right: -8px;
        bottom: -8px;
        border: 1px solid rgba(255, 45, 125, 0.2);
      }
      .corner-glow {
        position: absolute;
        width: 30px;
        height: 30px;
      }
      .cg-tl {
        top: 42px;
        left: 42px;
        border-top: 3px solid #ff2d7d;
        border-left: 3px solid #ff2d7d;
        box-shadow: -5px -5px 20px rgba(255, 45, 125, 0.4);
      }
      .cg-tr {
        top: 42px;
        right: 42px;
        border-top: 3px solid #00e5ff;
        border-right: 3px solid #00e5ff;
        box-shadow: 5px -5px 20px rgba(0, 229, 255, 0.4);
      }
      .cg-bl {
        bottom: 42px;
        left: 42px;
        border-bottom: 3px solid #00e5ff;
        border-left: 3px solid #00e5ff;
        box-shadow: -5px 5px 20px rgba(0, 229, 255, 0.4);
      }
      .cg-br {
        bottom: 42px;
        right: 42px;
        border-bottom: 3px solid #ff2d7d;
        border-right: 3px solid #ff2d7d;
        box-shadow: 5px 5px 20px rgba(255, 45, 125, 0.4);
      }
      .inner-glow {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 500px;
        height: 500px;
        border-radius: 50%;
        background: radial-gradient(
          circle,
          rgba(255, 45, 125, 0.08),
          rgba(0, 229, 255, 0.04),
          transparent 70%
        );
      }
      .logo-head {
        bottom: 80px;
        left: 50%;
        transform: translateX(-50%);
      }
      .logo-head img {
        height: 162px;
        filter: drop-shadow(0 0 25px rgba(255, 45, 125, 0.6))
          drop-shadow(0 0 50px rgba(0, 229, 255, 0.3));
      }
      .copy-block {
        position: absolute;
        z-index: 15;
        left: 50%;
        transform: translateX(-50%);
        width: 90%;
        max-width: 920px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
      }
      .copy-block.copy-block-bottom {
        bottom: 20%;
      }
      .copy-block.copy-block-top {
        top: 20%;
      }
            .copy-block .headline,
      .copy-block .subline {
        width: 100%;
        font-family: "IBM Plex Mono", ui-monospace, monospace;
        font-size: 42px;
        font-weight: 700;
        line-height: 1.7;
        color: #0a0015;
        letter-spacing: -0.02em;
        text-align: center;
      }
      .copy-block .headline span,
      .copy-block .subline span {
        display: inline;
        padding: 0.12em 0.5em;
        box-decoration-break: clone;
        -webkit-box-decoration-break: clone;
      }
      .text-neon-cyan .headline span,
      .text-neon-cyan .subline span {
        background: #00e5ff;
      }
      .text-neon-pink .headline span,
      .text-neon-pink .subline span {
        background: #ff2d7d;
      }
      .text-neon-purple .headline span,
      .text-neon-purple .subline span {
        background: #bf00ff;
        color: #ffffff;
      }
    </style>
