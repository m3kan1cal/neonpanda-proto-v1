<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        width: 1080px;
        height: 1080px;
        overflow: hidden;
        font-family: "Inter", "Segoe UI", Arial, sans-serif;
      }
      .canvas {
        width: 1080px;
        height: 1080px;
        position: relative;
        overflow: hidden;
      }
      .logo-full {
        position: absolute;
        z-index: 10;
      }
      .logo-head {
        position: absolute;
        z-index: 10;
      }
      .logo-full img {
        height: 100px;
        width: auto;
      }
      .logo-head img {
        height: 162px;
        width: auto;
      }

      .canvas {
        background: linear-gradient(
          135deg,
          #0a0015 0%,
          #1a0a2e 40%,
          #2d1b4e 70%,
          #0a0015 100%
        );
      }
      .shard {
        position: absolute;
        background: linear-gradient(
          135deg,
          rgba(255, 45, 125, 0.1),
          rgba(0, 229, 255, 0.05)
        );
        border: 1px solid rgba(0, 229, 255, 0.15);
        clip-path: polygon(20% 0%, 100% 0%, 80% 100%, 0% 100%);
      }
      .s1 {
        width: 400px;
        height: 600px;
        top: -100px;
        left: -50px;
        transform: rotate(-15deg);
        border-color: rgba(255, 45, 125, 0.2);
        background: linear-gradient(
          135deg,
          rgba(255, 45, 125, 0.08),
          transparent
        );
      }
      .s2 {
        width: 350px;
        height: 500px;
        top: 200px;
        right: -80px;
        transform: rotate(10deg);
      }
      .s3 {
        width: 300px;
        height: 400px;
        bottom: -50px;
        left: 200px;
        transform: rotate(-5deg);
        border-color: rgba(255, 45, 125, 0.15);
      }
      .s4 {
        width: 250px;
        height: 350px;
        top: 100px;
        left: 400px;
        transform: rotate(20deg);
        background: linear-gradient(
          135deg,
          rgba(0, 229, 255, 0.06),
          transparent
        );
      }
      .diamond {
        position: absolute;
        width: 200px;
        height: 200px;
        border: 1px solid rgba(0, 229, 255, 0.3);
        transform: rotate(45deg);
        box-shadow: 0 0 20px rgba(0, 229, 255, 0.1);
      }
      .d1 {
        top: 15%;
        left: 60%;
      }
      .d2 {
        bottom: 20%;
        left: 10%;
        width: 120px;
        height: 120px;
        border-color: rgba(255, 45, 125, 0.3);
        box-shadow: 0 0 20px rgba(255, 45, 125, 0.1);
      }
      .neon-bar {
        position: absolute;
        height: 3px;
        background: linear-gradient(90deg, #ff2d7d, #00e5ff);
        box-shadow: 0 0 10px rgba(255, 45, 125, 0.5);
      }
      .nb1 {
        top: 35%;
        left: 10%;
        width: 200px;
      }
      .nb2 {
        bottom: 30%;
        right: 10%;
        width: 150px;
      }
      .logo-full {
        bottom: 50px;
        left: 50%;
        transform: translateX(-50%);
      }
      .logo-full img {
        height: 100px;
        filter: drop-shadow(0 0 12px rgba(0, 229, 255, 0.7));
      }
      .copy-block {
        position: absolute;
        z-index: 15;
        left: 50%;
        transform: translateX(-50%);
        width: 90%;
        max-width: 920px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
      }
      .copy-block.copy-block-bottom {
        bottom: 20%;
      }
      .copy-block.copy-block-top {
        top: 20%;
      }
            .copy-block .headline,
      .copy-block .subline {
        width: 100%;
        font-family: "IBM Plex Mono", ui-monospace, monospace;
        font-size: 42px;
        font-weight: 700;
        line-height: 1.7;
        color: #0a0015;
        letter-spacing: -0.02em;
        text-align: center;
      }
      .copy-block .headline span,
      .copy-block .subline span {
        display: inline;
        padding: 0.12em 0.5em;
        box-decoration-break: clone;
        -webkit-box-decoration-break: clone;
      }
      .text-neon-cyan .headline span,
      .text-neon-cyan .subline span {
        background: #00e5ff;
      }
      .text-neon-pink .headline span,
      .text-neon-pink .subline span {
        background: #ff2d7d;
      }
      .text-neon-purple .headline span,
      .text-neon-purple .subline span {
        background: #bf00ff;
        color: #ffffff;
      }
    </style>
