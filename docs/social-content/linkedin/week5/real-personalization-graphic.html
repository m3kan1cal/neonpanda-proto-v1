<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real Personalization vs Personalization - NeonPanda</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 1200px;
            height: 627px;
            background: linear-gradient(135deg, #0f0f1e 0%, #1a0a2e 50%, #16213e 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* Animated grid background */
        .grid-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(90deg, rgba(0, 229, 255, 0.03) 1px, transparent 1px),
                linear-gradient(rgba(0, 229, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
        }

        .content {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 60px;
            gap: 40px;
        }

        .comparison-side {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .comparison-header {
            font-size: 16px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 12px;
        }

        .false-header {
            color: #ff6b6b;
            text-shadow: 0 0 10px rgba(255, 107, 107, 0.4);
        }

        .true-header {
            color: #00e5ff;
            text-shadow: 0 0 10px rgba(0, 229, 255, 0.4);
        }

        .feature-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .feature {
            font-size: 14px;
            font-weight: 500;
            padding: 10px 0;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #e0e0e0;
        }

        .feature-icon {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
            flex-shrink: 0;
        }

        .false .feature-icon {
            background: rgba(255, 107, 107, 0.2);
            border: 1px solid #ff6b6b;
            color: #ff6b6b;
        }

        .true .feature-icon {
            background: rgba(0, 229, 255, 0.2);
            border: 1px solid #00e5ff;
            color: #00e5ff;
        }

        .divider {
            position: absolute;
            left: 50%;
            top: 60px;
            bottom: 60px;
            width: 2px;
            background: linear-gradient(180deg, transparent, #ff2d7d 50%, transparent);
            transform: translateX(-50%);
        }

        .corner-accent {
            position: absolute;
            width: 100px;
            height: 100px;
            border: 2px solid;
            pointer-events: none;
        }

        .corner-accent.tl {
            top: 20px;
            left: 20px;
            border-right-color: transparent;
            border-bottom-color: transparent;
            border-color: rgba(0, 229, 255, 0.3);
        }

        .corner-accent.br {
            bottom: 20px;
            right: 20px;
            border-left-color: transparent;
            border-top-color: transparent;
            border-color: rgba(255, 45, 125, 0.3);
        }

        .logo {
            position: absolute;
            bottom: 20px;
            right: 40px;
            font-size: 14px;
            font-weight: 700;
            color: #ff2d7d;
            text-shadow: 0 0 10px rgba(255, 45, 125, 0.4);
            z-index: 20;
        }

        .fake {
            margin-left: 20px;
        }

        .real {
            margin-right: 20px;
            text-align: right;
        }

        .glow-line {
            height: 2px;
            margin-top: 16px;
            border-radius: 1px;
        }

        .glow-line.false {
            background: linear-gradient(90deg, #ff6b6b, transparent);
        }

        .glow-line.true {
            background: linear-gradient(90deg, transparent, #00e5ff);
        }
    </style>
</head>
<body>
    <div class="grid-bg"></div>
    <div class="corner-accent tl"></div>
    <div class="corner-accent br"></div>

    <div class="content">
        <div class="comparison-side fake">
            <div class="comparison-header false-header">❌ "Personalization"</div>
            <div class="feature-list">
                <div class="feature">
                    <div class="feature-icon">✗</div>
                    <span>Asks your age once</span>
                </div>
                <div class="feature">
                    <div class="feature-icon">✗</div>
                    <span>Static templates</span>
                </div>
                <div class="feature">
                    <div class="feature-icon">✗</div>
                    <span>Forgets context</span>
                </div>
                <div class="feature">
                    <div class="feature-icon">✗</div>
                    <span>No injury awareness</span>
                </div>
                <div class="feature">
                    <div class="feature-icon">✗</div>
                    <span>Ignores lifestyle</span>
                </div>
            </div>
            <div class="glow-line false"></div>
        </div>

        <div class="divider"></div>

        <div class="comparison-side real">
            <div class="comparison-header true-header">✓ Real Personalization</div>
            <div class="feature-list">
                <div class="feature">
                    <div class="feature-icon">✓</div>
                    <span>Learns from every session</span>
                </div>
                <div class="feature">
                    <div class="feature-icon">✓</div>
                    <span>Adapts in real-time</span>
                </div>
                <div class="feature">
                    <div class="feature-icon">✓</div>
                    <span>Remembers everything</span>
                </div>
                <div class="feature">
                    <div class="feature-icon">✓</div>
                    <span>Knows your history</span>
                </div>
                <div class="feature">
                    <div class="feature-icon">✓</div>
                    <span>Adjusts to your life</span>
                </div>
            </div>
            <div class="glow-line true"></div>
        </div>
    </div>

    <div class="logo">🐼 NEONPANDA</div>
</body>
</html>
