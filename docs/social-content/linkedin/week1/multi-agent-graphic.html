<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Agent AI Architecture</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 1200px;
            height: 627px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .container {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1A0A2E 0%, #0F1233 50%, #1A0A2E 100%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .grid-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.08;
            background-image:
                linear-gradient(90deg, #00E5FF 1px, transparent 1px),
                linear-gradient(0deg, #00E5FF 1px, transparent 1px);
            background-size: 40px 40px;
        }

        .title {
            position: relative;
            z-index: 2;
            font-size: 42px;
            font-weight: 800;
            background: linear-gradient(90deg, #FF2D7D 0%, #00E5FF 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 40px;
            text-transform: uppercase;
            letter-spacing: -1px;
        }

        .architecture {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 1000px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
        }

        /* SVG Network Diagram */
        svg {
            width: 100%;
            max-width: 900px;
            height: auto;
            filter: drop-shadow(0 0 20px rgba(255, 45, 125, 0.2));
        }

        .agent-node {
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .agent-node:hover circle {
            filter: drop-shadow(0 0 15px rgba(0, 229, 255, 0.8));
        }

        .agent-label {
            font-size: 12px;
            font-weight: 600;
            text-anchor: middle;
            fill: #FFFFFF;
            letter-spacing: 0.5px;
        }

        .connection-line {
            stroke-width: 2;
            opacity: 0.6;
            filter: drop-shadow(0 0 8px rgba(0, 229, 255, 0.4));
        }

        /* Bottom models section */
        .models-section {
            position: relative;
            z-index: 2;
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 20px;
            width: 100%;
        }

        .model-badge {
            background: rgba(0, 229, 255, 0.1);
            border: 2px solid #00E5FF;
            border-radius: 8px;
            padding: 12px 20px;
            text-align: center;
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.2);
            transition: all 0.3s ease;
        }

        .model-badge:hover {
            background: rgba(0, 229, 255, 0.2);
            box-shadow: 0 0 25px rgba(0, 229, 255, 0.4);
        }

        .model-name {
            font-size: 14px;
            font-weight: 700;
            color: #00E5FF;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }

        .model-desc {
            font-size: 11px;
            color: #CCCCCC;
            letter-spacing: 0.5px;
        }

        /* Accent elements */
        .glow {
            position: absolute;
            border-radius: 50%;
            filter: blur(40px);
            opacity: 0.3;
        }

        .glow-pink {
            width: 250px;
            height: 250px;
            background: #FF2D7D;
            top: 10%;
            left: 5%;
        }

        .glow-cyan {
            width: 200px;
            height: 200px;
            background: #00E5FF;
            bottom: 5%;
            right: 5%;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="grid-bg"></div>
        <div class="glow glow-pink"></div>
        <div class="glow glow-cyan"></div>

        <div class="title">Multi-Agent Architecture</div>

        <div class="architecture">
            <svg viewBox="0 0 900 280" xmlns="http://www.w3.org/2000/svg">
                <!-- Connection lines -->
                <line x1="450" y1="80" x2="150" y2="160" class="connection-line" stroke="#00E5FF"/>
                <line x1="450" y1="80" x2="300" y2="160" class="connection-line" stroke="#00E5FF"/>
                <line x1="450" y1="80" x2="450" y2="160" class="connection-line" stroke="#FF2D7D"/>
                <line x1="450" y1="80" x2="600" y2="160" class="connection-line" stroke="#00E5FF"/>
                <line x1="450" y1="80" x2="750" y2="160" class="connection-line" stroke="#00E5FF"/>

                <!-- Center Router Agent -->
                <g class="agent-node">
                    <circle cx="450" cy="60" r="35" fill="rgba(255, 45, 125, 0.9)" stroke="#FF2D7D" stroke-width="3" filter="drop-shadow(0 0 20px rgba(255, 45, 125, 0.6))"/>
                    <text x="450" y="65" class="agent-label" font-size="14">ROUTER</text>
                </g>

                <!-- Specialized Agents -->
                <!-- Coach Creator -->
                <g class="agent-node">
                    <circle cx="150" cy="180" r="30" fill="rgba(0, 229, 255, 0.8)" stroke="#00E5FF" stroke-width="2" filter="drop-shadow(0 0 15px rgba(0, 229, 255, 0.5))"/>
                    <text x="150" y="180" class="agent-label" font-size="11">Coach</text>
                    <text x="150" y="193" class="agent-label" font-size="11">Creator</text>
                </g>

                <!-- Workout Logger -->
                <g class="agent-node">
                    <circle cx="300" cy="180" r="30" fill="rgba(0, 229, 255, 0.8)" stroke="#00E5FF" stroke-width="2" filter="drop-shadow(0 0 15px rgba(0, 229, 255, 0.5))"/>
                    <text x="300" y="180" class="agent-label" font-size="11">Workout</text>
                    <text x="300" y="193" class="agent-label" font-size="11">Logger</text>
                </g>

                <!-- Program Designer -->
                <g class="agent-node">
                    <circle cx="450" cy="200" r="30" fill="rgba(255, 45, 125, 0.8)" stroke="#FF2D7D" stroke-width="2" filter="drop-shadow(0 0 15px rgba(255, 45, 125, 0.5))"/>
                    <text x="450" y="200" class="agent-label" font-size="11">Program</text>
                    <text x="450" y="213" class="agent-label" font-size="11">Designer</text>
                </g>

                <!-- Conversation Agent -->
                <g class="agent-node">
                    <circle cx="600" cy="180" r="30" fill="rgba(0, 229, 255, 0.8)" stroke="#00E5FF" stroke-width="2" filter="drop-shadow(0 0 15px rgba(0, 229, 255, 0.5))"/>
                    <text x="600" y="180" class="agent-label" font-size="11">Conversation</text>
                    <text x="600" y="193" class="agent-label" font-size="11">Agent</text>
                </g>

                <!-- Analytics Agent -->
                <g class="agent-node">
                    <circle cx="750" cy="180" r="30" fill="rgba(0, 229, 255, 0.8)" stroke="#00E5FF" stroke-width="2" filter="drop-shadow(0 0 15px rgba(0, 229, 255, 0.5))"/>
                    <text x="750" y="180" class="agent-label" font-size="11">Analytics</text>
                    <text x="750" y="193" class="agent-label" font-size="11">Agent</text>
                </g>
            </svg>

            <div class="models-section">
                <div class="model-badge">
                    <div class="model-name">Sonnet</div>
                    <div class="model-desc">Complex Reasoning</div>
                </div>
                <div class="model-badge">
                    <div class="model-name">Haiku</div>
                    <div class="model-desc">Fast Inference</div>
                </div>
                <div class="model-badge">
                    <div class="model-name">Nova</div>
                    <div class="model-desc">Ultra-Low Latency</div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
