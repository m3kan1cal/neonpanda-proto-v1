<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>One App, Every Athlete - NeonPanda</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 1200px;
            height: 627px;
            background: linear-gradient(135deg, #0f0f1e 0%, #1a0a2e 50%, #16213e 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            overflow: hidden;
            position: relative;
        }

        .grid-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(90deg, rgba(0, 229, 255, 0.03) 1px, transparent 1px),
                linear-gradient(rgba(0, 229, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
        }

        .content {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            gap: 40px;
        }

        .title {
            font-size: 48px;
            font-weight: 800;
            text-align: center;
            background: linear-gradient(90deg, #00e5ff, #ff2d7d, #00e5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -1px;
        }

        .athletes {
            display: flex;
            gap: 40px;
            justify-content: center;
            align-items: flex-end;
        }

        .athlete {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .silhouette {
            width: 80px;
            height: 120px;
            background: linear-gradient(135deg, rgba(0, 229, 255, 0.2), rgba(255, 45, 125, 0.2));
            border: 2px solid;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            position: relative;
            overflow: hidden;
        }

        .athlete:nth-child(1) .silhouette {
            border-color: #ff2d7d;
            background: linear-gradient(135deg, rgba(255, 45, 125, 0.15), rgba(255, 45, 125, 0.05));
            box-shadow: 0 0 30px rgba(255, 45, 125, 0.3);
        }

        .athlete:nth-child(2) .silhouette {
            border-color: #00e5ff;
            background: linear-gradient(135deg, rgba(0, 229, 255, 0.15), rgba(0, 229, 255, 0.05));
            box-shadow: 0 0 30px rgba(0, 229, 255, 0.3);
        }

        .athlete:nth-child(3) .silhouette {
            border-color: #9d4edd;
            background: linear-gradient(135deg, rgba(157, 78, 221, 0.15), rgba(157, 78, 221, 0.05));
            box-shadow: 0 0 30px rgba(157, 78, 221, 0.3);
        }

        .discipline {
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            text-align: center;
        }

        .athlete:nth-child(1) .discipline {
            color: #ff2d7d;
            text-shadow: 0 0 10px rgba(255, 45, 125, 0.4);
        }

        .athlete:nth-child(2) .discipline {
            color: #00e5ff;
            text-shadow: 0 0 10px rgba(0, 229, 255, 0.4);
        }

        .athlete:nth-child(3) .discipline {
            color: #9d4edd;
            text-shadow: 0 0 10px rgba(157, 78, 221, 0.4);
        }

        .features {
            display: flex;
            gap: 20px;
            justify-content: center;
            width: 100%;
        }

        .feature-box {
            background: rgba(255, 45, 125, 0.08);
            border: 1px solid rgba(255, 45, 125, 0.3);
            border-radius: 8px;
            padding: 16px 20px;
            max-width: 240px;
            text-align: center;
        }

        .feature-box:nth-child(2) {
            background: rgba(0, 229, 255, 0.08);
            border-color: rgba(0, 229, 255, 0.3);
        }

        .feature-box:nth-child(3) {
            background: rgba(157, 78, 221, 0.08);
            border-color: rgba(157, 78, 221, 0.3);
        }

        .feature-title {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #ff2d7d;
            margin-bottom: 8px;
        }

        .feature-box:nth-child(2) .feature-title {
            color: #00e5ff;
        }

        .feature-box:nth-child(3) .feature-title {
            color: #9d4edd;
        }

        .feature-text {
            font-size: 11px;
            color: #b0b0c0;
            line-height: 1.5;
        }

        .logo {
            position: absolute;
            bottom: 20px;
            right: 40px;
            font-size: 14px;
            font-weight: 700;
            color: #ff2d7d;
            text-shadow: 0 0 10px rgba(255, 45, 125, 0.4);
            z-index: 20;
        }

        .corner-accent {
            position: absolute;
            width: 100px;
            height: 100px;
            border: 2px solid;
            pointer-events: none;
        }

        .corner-accent.tl {
            top: 20px;
            left: 20px;
            border-right-color: transparent;
            border-bottom-color: transparent;
            border-color: rgba(0, 229, 255, 0.3);
        }

        .corner-accent.br {
            bottom: 20px;
            right: 20px;
            border-left-color: transparent;
            border-top-color: transparent;
            border-color: rgba(255, 45, 125, 0.3);
        }
    </style>
</head>
<body>
    <div class="grid-bg"></div>
    <div class="corner-accent tl"></div>
    <div class="corner-accent br"></div>

    <div class="content">
        <div class="title">One App, Every Athlete</div>

        <div class="athletes">
            <div class="athlete">
                <div class="silhouette">🏋️</div>
                <div class="discipline">CrossFit</div>
            </div>
            <div class="athlete">
                <div class="silhouette">💪</div>
                <div class="discipline">Powerlifting</div>
            </div>
            <div class="athlete">
                <div class="silhouette">🏃</div>
                <div class="discipline">Running</div>
            </div>
        </div>

        <div class="features">
            <div class="feature-box">
                <div class="feature-title">Discipline-Specific</div>
                <div class="feature-text">Built from the ground up for your training style</div>
            </div>
            <div class="feature-box">
                <div class="feature-title">Speaks Your Language</div>
                <div class="feature-text">Understands the metrics and terminology you use</div>
            </div>
            <div class="feature-box">
                <div class="feature-title">Personalized Programming</div>
                <div class="feature-text">10+ disciplines with depth, not breadth</div>
            </div>
        </div>
    </div>

    <div class="logo">🐼 NEONPANDA</div>
</body>
</html>
